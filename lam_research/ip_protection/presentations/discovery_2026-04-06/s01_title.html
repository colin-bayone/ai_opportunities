<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discovery Session - Lam Research</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple-darkest: #2e1065;
      --purple-dark: #4c1d95;
      --purple-mid: #5b21b6;
      --purple-bright: #6d28d9;
      --purple-accent: #a855f7;
      --steel-light: #64748b;
      --steel-glow: #e879f9;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e6e8eb;
      min-height: 100vh;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, var(--purple-darkest) 0%, #3b1080 40%, var(--purple-mid) 100%);
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .logo span { color: var(--purple-accent); }

    h1 {
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .prepared-for {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .client-name {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
    }

    .presenter {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }

    .presenter-title {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }

    .date {
      margin-top: 40px;
      font-size: 14px;
      font-weight: 500;
      color: var(--purple-accent);
      letter-spacing: 1px;
    }

    .slide-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 40px 12px;
    }

    .slide-footer-bar {
      height: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1), var(--purple-accent), rgba(255,255,255,0.1));
      border-radius: 2px;
    }

    .slide-nav { position: fixed; bottom: 18px; left: 18px; display: flex; gap: 6px; z-index: 100; }
    .slide-nav a { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: rgba(46,16,101,0.75); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: background 0.2s, color 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    .slide-nav a:hover { background: rgba(109,40,217,0.9); color: #fff; }
    .slide-nav a.disabled { opacity: 0.25; pointer-events: none; }
  </style>
</head>
<body>

  <div class="slide">
    <div class="logo">Bay<span>One</span></div>
    <h1>Discovery Session</h1>
    <div class="subtitle">IP Protection and Knowledge Enablement</div>
    <div class="prepared-for">Prepared for</div>
    <div class="client-name">Lam Research</div>
    <div class="presenter">Colin Moore</div>
    <div class="presenter-title">Director of AI, BayOne Solutions</div>
    <div class="date">April 2026</div>

    <div class="slide-footer">
      <div class="slide-footer-bar"></div>
    </div>
  </div>

  <div class="slide-nav">
    <a class="disabled"><i class="fa-solid fa-chevron-left"></i></a>
    <a href="s02_core_challenge.html"><i class="fa-solid fa-chevron-right"></i></a>
    <a href="s01_title.html" style="margin-left: 6px;"><i class="fa-solid fa-house"></i></a>
  </div>

</body>
</html>
