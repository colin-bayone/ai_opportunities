# -----------------------------------------------------------------------------
# SERVICES OBJECTIVES (Section 2.1)
# Rich text content - supports basic HTML formatting
# -----------------------------------------------------------------------------
services_objectives:
  organization_background: |
    This scope is being requested by Cisco's Cloud Networking Group (CN) Test team. This team is responsible for validating (regression and automation tests) the generic engineering releases and customer specials (specific customer requests) releases for Nexus 9000 (switches) product line along with the development of required infrastructure tools.

    Cisco NX-OS (Nexus operating system) Software is a data center-class operating system built with modularity, resiliency, and serviceability at its foundation. Cisco NX-OS helps ensure continuous availability for mission-critical data center environments and provides a robust feature set that fulfils the switching and storage networking needs of data centers.

  outsourced: |
    To determine the best user experience in upcoming NX-OS releases, Cisco needs to execute automation and regression testing of the features in an upcoming NX-OS release.

  impact_benefit: |
    Apart from cost saving, the other benefits of this service is speed of delivery, quality and consistency with Cisco internal brand guidelines.

  supplier_management: |
    The supplier will manage the Service outcome along with the resources. The supplier will be responsible for managing the resources in regard to ensuring they understand and complete the project to satisfaction as well as provide any necessary training. The supplier is responsible for replacing the resource with minimal to no disruption to Cisco or the Service. Supplier is responsible for the service outcome. Supplier has a lead who is primary point of contact and all work is routed through the lead.

# -----------------------------------------------------------------------------
# SERVICE LEVEL AGREEMENTS (Section 2.2)
# -----------------------------------------------------------------------------
service_levels:
  intro_text: |
    Supplier shall perform the following services ("Services") detailed in the tables below.

    Supplier shall meet or exceed each of the service level requirements below ("Service Levels"). Supplier shall measure, calculate, and report the Service Levels no later than the tenth day of each month. Cisco and Supplier shall mutually agree on the criteria and data source for the report.

    Supplier shall detail all agreed upon non-billable deliverables such as but not limited to: Scheduled reports, progress update meeting cadence, Project planning Cadence, Quality Business reviews, etc).

    If Supplier fails to meet any Service Level, in addition to any applicable rights, remedies, and obligations set out in the Program Agreement, Supplier shall make fee adjustments as set forth below in Supplier's next invoice. If the fee adjustment arises after the final invoice Supplier provides in connection with this SOW, Supplier shall refund to Cisco an amount equal to the fee adjustment.

  slas:
    - table_number: "4.2.1"
      name: "Regression execution"
      description: "Execute all identified suites on QR2F and complete the analysis of all failures"
      measurement: "100% execution and 100% failure analysis"
      target: "QR2F - 100% completion"
      frequency: "Weekly"
      fee_adjustment: ""

    - table_number: "4.2.2"
      name: "Testcase automation"
      description: "Automate all identified testcases and fix all open autons"
      measurement: "100% completion of all identified testcases"
      target: "QR2F - 100% completion"
      frequency: "Weekly"
      fee_adjustment: ""

