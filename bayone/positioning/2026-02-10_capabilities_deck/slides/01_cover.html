<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BayOne Solutions - AI Capabilities</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #6d28d9 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .cover::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 80%;
      height: 200%;
      background: linear-gradient(135deg, rgba(168,85,247,0.15) 0%, rgba(236,72,153,0.1) 50%, transparent 70%);
      transform: rotate(-12deg);
    }

    .cover::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(147,51,234,0.2) 0%, transparent 70%);
      border-radius: 50%;
    }

    .cover-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    .cover-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e879f9;
      margin-bottom: 24px;
    }

    .cover h1 {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }

    .cover-subtitle {
      font-size: 22px;
      font-weight: 300;
      color: rgba(255,255,255,0.8);
      margin-bottom: 48px;
      max-width: 600px;
      line-height: 1.5;
    }

    .cover-meta {
      display: flex;
      gap: 48px;
      padding-top: 48px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    .cover-meta-item label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .cover-meta-item span {
      font-size: 15px;
      font-weight: 500;
    }

    .logo {
      position: absolute;
      bottom: 80px;
      right: 80px;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      z-index: 1;
    }

    .logo span { color: #e879f9; }

    @media print {
      @page {
        size: 8.5in 11in;
        margin: 0;
      }

      .cover {
        min-height: 0;
        height: 11in;
        padding: 60px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .cover h1 { font-size: 42pt; }
      .cover-subtitle { font-size: 16pt; }
      .logo { font-size: 24px; bottom: 60px; right: 60px; }
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="cover-content">
      <div class="cover-label">AI Solutions Partner</div>
      <h1>Enterprise AI Capabilities</h1>
      <p class="cover-subtitle">
        From strategy to production. We design, build, and deploy AI systems
        that deliver measurable business outcomes.
      </p>
      <div class="cover-meta">
        <div class="cover-meta-item">
          <label>Contact</label>
          <span>Colin Moore, Director of AI</span>
        </div>
        <div class="cover-meta-item">
          <label>Date</label>
          <span>February 2026</span>
        </div>
      </div>
    </div>
    <div class="logo">Bay<span>One</span> Solutions</div>
  </div>
</body>
</html>
