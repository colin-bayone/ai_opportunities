<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Slide 21: Questions and Discussion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-darkest: #0c1929;
      --blue-dark: #15293e;
      --blue-mid: #1e3a5f;
      --blue-bright: #2563eb;
      --blue-accent: #3b82f6;
      --steel-light: #64748b;
      --steel-glow: #94a3b8;
      --primary: #0f172a;
      --text: #334155;
      --text-light: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e6e8eb;
      min-height: 100vh;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, var(--blue-darkest) 0%, #0f2744 50%, var(--blue-mid) 100%);
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .slide-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .header-logo { font-size: 16px; font-weight: 700; color: #fff; }
    .header-logo span { color: var(--blue-accent); }
    .header-title { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }

    .slide-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .slide-content h2 {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .slide-content .lead {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      max-width: 600px;
      margin-bottom: 36px;
    }

    .contact-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 28px 48px;
      text-align: center;
    }

    .contact-card .name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .contact-card .title {
      font-size: 15px;
      font-weight: 500;
      color: var(--blue-accent);
      margin-bottom: 4px;
    }

    .contact-card .email {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
    }

    .slide-footer {
      flex-shrink: 0;
      padding: 10px 40px 12px;
    }

    .slide-footer-bar {
      height: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1), var(--blue-accent), rgba(255,255,255,0.1));
      border-radius: 2px;
    }

    .slide-number {
      text-align: right;
      margin-top: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--blue-accent);
      letter-spacing: 2px;
    }
    .slide-nav { position: fixed; bottom: 18px; left: 18px; display: flex; gap: 6px; z-index: 100; }
    .slide-nav a { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; background: rgba(12,25,41,0.75); color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: background 0.2s, color 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    .slide-nav a:hover { background: rgba(37,99,235,0.9); color: #fff; }
    .slide-nav a.disabled { opacity: 0.25; pointer-events: none; }
  </style>
</head>
<body>

  <div class="slide">
    <div class="slide-header">
      <div class="header-logo">Master<span>minds</span></div>
      <div class="header-title">April 2026</div>
    </div>

    <div class="slide-content">
      <h2>Questions and Discussion</h2>
      <p class="lead">Ask about anything we covered today, your specific practice, a tool you have been considering, or something you have been reading about AI that you want a straight answer on.</p>

      <div class="contact-card">
        <p class="name">Colin Moore</p>
        <p class="title">Director of AI, BayOne Solutions</p>
        <p class="email">cmoore@bayone.com</p>
      </div>
    </div>

    <div class="slide-footer">
      <div class="slide-footer-bar"></div>
      <div class="slide-number">21</div>
    </div>
  </div>

  <div class="slide-nav">
    <a href="s5_05_getting_started.html"><i class="fa-solid fa-chevron-left"></i></a>
    <a class="disabled"><i class="fa-solid fa-chevron-right"></i></a>
    <a href="s0_00_toc.html" style="margin-left: 6px;"><i class="fa-solid fa-house"></i></a>
  </div>
</body>
</html>
