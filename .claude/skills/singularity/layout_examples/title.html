<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BayOne Solutions: Engagement Title</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-darkest: #0c1929;
      --blue-dark: #15293e;
      --blue-mid: #1e3a5f;
      --blue-bright: #2563eb;
      --blue-accent: #3b82f6;
      --steel-light: #64748b;
      --steel-glow: #94a3b8;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e6e8eb;
      min-height: 100vh;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, var(--blue-darkest) 0%, #0f2744 40%, var(--blue-mid) 100%);
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .logo span { color: var(--blue-accent); }

    h1 {
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .presenter {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }

    .presenter-title {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }

    .date {
      margin-top: 40px;
      font-size: 14px;
      font-weight: 500;
      color: var(--blue-accent);
      letter-spacing: 1px;
    }

    .slide-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 40px 12px;
    }

    .slide-footer-bar {
      height: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1), var(--blue-accent), rgba(255,255,255,0.1));
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="slide">
    <div class="logo">BayOne <span>Solutions</span></div>
    <h1>Engagement Title</h1>
    <div class="subtitle">A presentation subtitle goes here</div>
    <div class="presenter">Presenter Name</div>
    <div class="presenter-title">Role, BayOne Solutions</div>
    <div class="date">Month Year</div>

    <div class="slide-footer">
      <div class="slide-footer-bar"></div>
    </div>
  </div>

</body>
</html>
