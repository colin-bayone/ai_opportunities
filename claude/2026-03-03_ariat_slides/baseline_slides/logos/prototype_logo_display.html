<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Display Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }
    h1 {
      text-align: center;
      color: #1a1a2e;
      margin-bottom: 40px;
      font-weight: 600;
    }
    .option {
      background: white;
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .option-label {
      font-size: 14px;
      font-weight: 600;
      color: #6D28D9;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    /* OPTION A: Logo Wall - Clean grid, no borders */
    .logo-wall {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 40px 50px;
    }
    .logo-wall img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    /* OPTION B: Industry Clusters */
    .industry-clusters {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }
    .cluster {
      text-align: center;
    }
    .cluster-label {
      font-size: 11px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .cluster-logos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }
    .cluster-logos img {
      height: 28px;
      width: auto;
      object-fit: contain;
    }

    /* OPTION C: Marquee Strip */
    .marquee-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }
    .marquee-strip img {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    /* OPTION D: Tiered Display */
    .tiered {
      text-align: center;
    }
    .tier-1 {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      margin-bottom: 30px;
    }
    .tier-1 img {
      height: 48px;
      width: auto;
      object-fit: contain;
    }
    .tier-2 {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 30px 40px;
    }
    .tier-2 img {
      height: 28px;
      width: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <h1>Logo Display Options</h1>

  <!-- OPTION A: Logo Wall -->
  <div class="option">
    <div class="option-label">Option A: Logo Wall</div>
    <div class="logo-wall">
      <img src="salesforce.png" alt="Salesforce">
      <img src="google.png" alt="Google">
      <img src="cisco.png" alt="Cisco">
      <img src="intel.png" alt="Intel">

      <img src="prudential.png" alt="Prudential">
      <img src="unitedhealthcare.png" alt="UnitedHealthcare">
      <img src="gilead.png" alt="Gilead">
      <img src="questdiagnostics.png" alt="Quest Diagnostics">
      <img src="intuitive.png" alt="Intuitive Surgical">

      <img src="coherent.png" alt="Coherent">

        <img src="att.png" alt="AT&T">
        <img src="sony.png" alt="Sony">
        <img src="northropgrumman.png" alt="Northrop Grumman">
        <img src="toshiba.png" alt="Toshiba">
      </div>
    </div>
  </div>

</body>
</html>
