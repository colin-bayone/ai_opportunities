<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Comparison Bars</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .comparison-container {
      width: 300px;
    }

    .comparison-row {
      margin-bottom: 16px;
    }

    .comparison-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .comparison-label .name { color: #475569; }
    .comparison-label .value { color: #5b21b6; font-weight: 600; }

    .comparison-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }

    .comparison-fill {
      height: 100%;
      background: linear-gradient(90deg, #5b21b6, #a855f7);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="comparison-container">
    <div class="comparison-row">
      <div class="comparison-label">
        <span class="name">Reusable patterns</span>
        <span class="value">70%</span>
      </div>
      <div class="comparison-bar">
        <div class="comparison-fill" style="width: 70%"></div>
      </div>
    </div>
    <div class="comparison-row">
      <div class="comparison-label">
        <span class="name">Custom integration</span>
        <span class="value">30%</span>
      </div>
      <div class="comparison-bar">
        <div class="comparison-fill" style="width: 30%"></div>
      </div>
    </div>
  </div>
</body>
</html>
