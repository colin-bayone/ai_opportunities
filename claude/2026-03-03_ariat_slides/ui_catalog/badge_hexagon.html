<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Hexagon Badges</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .hex-container {
      display: flex;
      gap: 8px;
    }

    .hex-badge {
      width: 70px;
      height: 80px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .hex-badge::before {
      content: '';
      position: absolute;
      width: 60px;
      height: 34px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .hex-badge::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 34px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(60deg);
    }

    .hex-badge .hex-third {
      position: absolute;
      width: 60px;
      height: 34px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-60deg);
    }

    .hex-badge .hex-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
    }

    .hex-badge .hex-icon {
      font-size: 18px;
    }

    .hex-badge .hex-label {
      font-size: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="hex-container">
    <div class="hex-badge">
      <div class="hex-third"></div>
      <div class="hex-content">
        <div class="hex-icon">&#x2699;</div>
        <div class="hex-label">DevOps</div>
      </div>
    </div>
    <div class="hex-badge">
      <div class="hex-third"></div>
      <div class="hex-content">
        <div class="hex-icon">&#x2630;</div>
        <div class="hex-label">Data</div>
      </div>
    </div>
    <div class="hex-badge">
      <div class="hex-third"></div>
      <div class="hex-content">
        <div class="hex-icon">&#x2709;</div>
        <div class="hex-label">Docs</div>
      </div>
    </div>
    <div class="hex-badge">
      <div class="hex-third"></div>
      <div class="hex-content">
        <div class="hex-icon">&#x2295;</div>
        <div class="hex-label">Ops</div>
      </div>
    </div>
    <div class="hex-badge">
      <div class="hex-third"></div>
      <div class="hex-content">
        <div class="hex-icon">&#x2713;</div>
        <div class="hex-label">Auto</div>
      </div>
    </div>
  </div>
</body>
</html>
