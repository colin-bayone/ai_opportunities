<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Numbered Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #e8e6eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .numbered-cards {
      display: flex;
      gap: 16px;
    }

    .numbered-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 20px;
      width: 160px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(124,58,237,0.1);
    }

    .numbered-card .num {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #5b21b6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .numbered-card h4 {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
      margin: 0 0 6px 0;
    }

    .numbered-card p {
      font-size: 11px;
      color: #64748b;
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="numbered-cards">
    <div class="numbered-card">
      <div class="num">01</div>
      <h4>Developer Productivity</h4>
      <p>Graph topology, cascade detection</p>
    </div>
    <div class="numbered-card">
      <div class="num">02</div>
      <h4>Enterprise Automation</h4>
      <p>Confidence routing, exception handling</p>
    </div>
    <div class="numbered-card">
      <div class="num">03</div>
      <h4>Data & Analytics</h4>
      <p>Lineage tracing, impact simulation</p>
    </div>
    <div class="numbered-card">
      <div class="num">04</div>
      <h4>Document Intelligence</h4>
      <p>Logic extraction, asset consolidation</p>
    </div>
  </div>
</body>
</html>
