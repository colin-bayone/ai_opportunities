<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Before/After Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .compare-cards {
      display: flex;
      gap: 0;
    }

    .compare-card {
      padding: 24px 28px;
      width: 220px;
    }

    .compare-card.before {
      background: #f1f5f9;
      border-radius: 12px 0 0 12px;
      border: 1px solid #e2e8f0;
      border-right: none;
    }

    .compare-card.after {
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 0 12px 12px 0;
      color: #fff;
    }

    .compare-card .label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .compare-card.before .label { color: #64748b; }
    .compare-card.after .label { color: rgba(255,255,255,0.7); }

    .compare-card .value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .compare-card.before .value { color: #475569; }

    .compare-card .desc {
      font-size: 12px;
    }

    .compare-card.before .desc { color: #64748b; }
    .compare-card.after .desc { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <div class="compare-cards">
    <div class="compare-card before">
      <div class="label">Without</div>
      <div class="value">1x</div>
      <div class="desc">One item at a time</div>
    </div>
    <div class="compare-card after">
      <div class="label">With BayOne</div>
      <div class="value">6x</div>
      <div class="desc">Batch processing</div>
    </div>
  </div>
</body>
</html>
