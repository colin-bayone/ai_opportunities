<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Checkmark List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .check-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #334155;
    }

    .check-icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="check-list">
    <div class="check-item">
      <div class="check-icon">&#x2713;</div>
      Process six reports in one pass instead of individually
    </div>
    <div class="check-item">
      <div class="check-icon">&#x2713;</div>
      Extract logic from legacy systems automatically
    </div>
    <div class="check-item">
      <div class="check-icon">&#x2713;</div>
      Route exceptions by confidence level
    </div>
    <div class="check-item">
      <div class="check-icon">&#x2713;</div>
      Map dependencies before making changes
    </div>
  </div>
</body>
</html>
