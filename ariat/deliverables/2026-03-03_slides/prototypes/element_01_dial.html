<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element: Reusable Architecture Dial</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .dial-container {
      text-align: center;
    }

    .dial {
      position: relative;
      width: 200px;
      height: 120px;
      margin: 0 auto;
    }

    .dial-bg {
      position: absolute;
      width: 200px;
      height: 100px;
      border-radius: 100px 100px 0 0;
      background: linear-gradient(90deg,
        #6d28d9 0%,
        #6d28d9 70%,
        #a855f7 70%,
        #a855f7 100%
      );
      overflow: hidden;
    }

    .dial-inner {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 70px;
      background: #1a1a2e;
      border-radius: 70px 70px 0 0;
    }

    .dial-needle {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 4px;
      height: 70px;
      background: linear-gradient(to top, #fff 0%, #fff 60%, transparent 60%);
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-36deg); /* 70% = -36deg from vertical */
      border-radius: 2px;
    }

    .dial-center {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }

    .dial-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 10px;
    }

    .dial-label {
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
    }

    .dial-value {
      margin-top: 16px;
    }

    .dial-value .number {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .dial-value .percent {
      font-size: 24px;
      font-weight: 600;
      color: #a855f7;
    }

    .dial-value .label {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .dial-breakdown {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 20px;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .breakdown-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .breakdown-dot.reusable { background: #6d28d9; }
    .breakdown-dot.custom { background: #a855f7; }

    .breakdown-text {
      font-size: 12px;
      color: #cbd5e1;
    }

    .breakdown-text span {
      font-weight: 600;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="dial-container">
    <div class="dial">
      <div class="dial-bg"></div>
      <div class="dial-inner"></div>
      <div class="dial-needle"></div>
      <div class="dial-center"></div>
    </div>
    <div class="dial-labels">
      <span class="dial-label">0%</span>
      <span class="dial-label">100%</span>
    </div>
    <div class="dial-value">
      <span class="number">70</span><span class="percent">%</span>
      <div class="label">Reusable Architecture</div>
    </div>
    <div class="dial-breakdown">
      <div class="breakdown-item">
        <div class="breakdown-dot reusable"></div>
        <div class="breakdown-text"><span>70%</span> Proven patterns</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-dot custom"></div>
        <div class="breakdown-text"><span>30%</span> Your integration</div>
      </div>
    </div>
  </div>
</body>
</html>
