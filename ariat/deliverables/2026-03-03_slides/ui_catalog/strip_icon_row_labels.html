<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Icon Row with Labels</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .icon-strip {
      display: flex;
      gap: 32px;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .icon-item .icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
    }

    .icon-item .label {
      font-size: 11px;
      font-weight: 500;
      color: #475569;
      max-width: 70px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="icon-strip">
    <div class="icon-item">
      <div class="icon">&#x2699;</div>
      <div class="label">DevOps</div>
    </div>
    <div class="icon-item">
      <div class="icon">&#x2630;</div>
      <div class="label">Automation</div>
    </div>
    <div class="icon-item">
      <div class="icon">&#x2261;</div>
      <div class="label">Analytics</div>
    </div>
    <div class="icon-item">
      <div class="icon">&#x2709;</div>
      <div class="label">Documents</div>
    </div>
    <div class="icon-item">
      <div class="icon">&#x2295;</div>
      <div class="label">Operations</div>
    </div>
  </div>
</body>
</html>
