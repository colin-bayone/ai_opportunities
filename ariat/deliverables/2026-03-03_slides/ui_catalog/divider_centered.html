<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Centered Label Divider</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .divider-centered {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 500px;
    }

    .divider-centered .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #7c3aed, transparent);
    }

    .divider-centered .label {
      font-size: 11px;
      font-weight: 500;
      color: #5b21b6;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="divider-centered">
    <div class="line"></div>
    <span class="label">Solution Areas</span>
    <div class="line"></div>
  </div>
</body>
</html>
