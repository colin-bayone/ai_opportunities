<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Compact Horizontal Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #e8e6eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .horizontal-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 500px;
    }

    .horizontal-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      border: 1px solid #e2e8f0;
    }

    .horizontal-card .icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }

    .horizontal-card .content {
      flex: 1;
    }

    .horizontal-card h4 {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
      margin: 0 0 4px 0;
    }

    .horizontal-card p {
      font-size: 11px;
      color: #64748b;
      margin: 0;
    }

    .horizontal-card .badge {
      padding: 4px 10px;
      background: #f1f5f9;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      color: #5b21b6;
    }
  </style>
</head>
<body>
  <div class="horizontal-cards">
    <div class="horizontal-card">
      <div class="icon">&#x2699;</div>
      <div class="content">
        <h4>Developer Productivity</h4>
        <p>Codebase intelligence, impact analysis, CI/CD acceleration</p>
      </div>
      <div class="badge">Cisco</div>
    </div>
    <div class="horizontal-card">
      <div class="icon">&#x2630;</div>
      <div class="content">
        <h4>Enterprise Automation</h4>
        <p>Multi-agent orchestration, confidence-based routing</p>
      </div>
      <div class="badge">Sephora</div>
    </div>
    <div class="horizontal-card">
      <div class="icon">&#x2261;</div>
      <div class="content">
        <h4>Data & Analytics</h4>
        <p>Dependency mapping, metric lineage, change simulation</p>
      </div>
      <div class="badge">Multiple</div>
    </div>
  </div>
</body>
</html>
