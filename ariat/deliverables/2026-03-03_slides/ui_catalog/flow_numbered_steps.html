<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Numbered Steps Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .numbered-flow {
      display: flex;
      gap: 40px;
    }

    .numbered-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .numbered-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 20px;
      left: calc(50% + 30px);
      width: calc(100% - 20px);
      height: 2px;
      background: linear-gradient(90deg, #a855f7, #6d28d9);
    }

    .step-number {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .step-label {
      font-size: 12px;
      font-weight: 500;
      color: #334155;
      text-align: center;
      max-width: 80px;
    }
  </style>
</head>
<body>
  <div class="numbered-flow">
    <div class="numbered-step">
      <div class="step-number">1</div>
      <div class="step-label">Cluster Similar Items</div>
    </div>
    <div class="numbered-step">
      <div class="step-number">2</div>
      <div class="step-label">Extract Patterns</div>
    </div>
    <div class="numbered-step">
      <div class="step-number">3</div>
      <div class="step-label">Batch Process</div>
    </div>
    <div class="numbered-step">
      <div class="step-number">4</div>
      <div class="step-label">Validate & Deploy</div>
    </div>
  </div>
</body>
</html>
