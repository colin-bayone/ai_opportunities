<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Pill Label Divider</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .divider-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 500px;
    }

    .divider-pill .line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider-pill .label {
      padding: 6px 16px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="divider-pill">
    <div class="line"></div>
    <span class="label">How We Work</span>
    <div class="line"></div>
  </div>
</body>
</html>
