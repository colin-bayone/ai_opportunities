<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Horizontal Bar with Icons</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .icon-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #fff;
      padding: 16px 28px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .icon-bar .bar-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-bar .bar-item .icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
    }

    .icon-bar .bar-item .text {
      font-size: 13px;
      font-weight: 500;
      color: #334155;
    }

    .icon-bar .divider {
      width: 1px;
      height: 24px;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="icon-bar">
    <div class="bar-item">
      <div class="icon">&#x2699;</div>
      <span class="text">Graph Topology</span>
    </div>
    <div class="divider"></div>
    <div class="bar-item">
      <div class="icon">&#x2630;</div>
      <span class="text">Batch Processing</span>
    </div>
    <div class="divider"></div>
    <div class="bar-item">
      <div class="icon">&#x2713;</div>
      <span class="text">Confidence Routing</span>
    </div>
  </div>
</body>
</html>
