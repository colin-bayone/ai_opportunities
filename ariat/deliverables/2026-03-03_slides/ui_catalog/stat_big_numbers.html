<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Big Number Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .stat-row {
      display: flex;
      gap: 40px;
    }

    .stat-card {
      text-align: center;
    }

    .stat-number {
      font-size: 56px;
      font-weight: 700;
      background: linear-gradient(135deg, #5b21b6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-number">70%</div>
      <div class="stat-label">Reusable Architecture</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">6x</div>
      <div class="stat-label">Batch Processing</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">3</div>
      <div class="stat-label">Phase Engagement</div>
    </div>
  </div>
</body>
</html>
