<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Inline Metric Badges</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .metric-badges {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .metric-badge {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 10px 18px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .metric-badge .value {
      font-size: 18px;
      font-weight: 700;
      color: #5b21b6;
    }

    .metric-badge .unit {
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="metric-badges">
    <div class="metric-badge">
      <span class="value">70/30</span>
      <span class="unit">reuse ratio</span>
    </div>
    <div class="metric-badge">
      <span class="value">6+</span>
      <span class="unit">items per pass</span>
    </div>
    <div class="metric-badge">
      <span class="value">3</span>
      <span class="unit">tier validation</span>
    </div>
    <div class="metric-badge">
      <span class="value">5</span>
      <span class="unit">solution areas</span>
    </div>
  </div>
</body>
</html>
