<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Left Aligned Divider with Icon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .divider-left {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 500px;
    }

    .divider-left .icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
    }

    .divider-left .label {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
    }

    .divider-left .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, #7c3aed, transparent);
    }
  </style>
</head>
<body>
  <div class="divider-left">
    <div class="icon">&#x2699;</div>
    <span class="label">Developer Productivity</span>
    <div class="line"></div>
  </div>
</body>
</html>
