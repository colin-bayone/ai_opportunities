<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Timeline Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .timeline {
      display: flex;
      position: relative;
      padding: 20px 0;
      width: 600px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #5b21b6, #7c3aed, #a855f7);
      border-radius: 2px;
      transform: translateY(-50%);
    }

    .timeline-point {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .timeline-dot {
      width: 16px;
      height: 16px;
      background: #fff;
      border: 4px solid #7c3aed;
      border-radius: 50%;
      z-index: 1;
    }

    .timeline-label {
      position: absolute;
      top: 28px;
      font-size: 11px;
      font-weight: 500;
      color: #475569;
      white-space: nowrap;
    }

    .timeline-point:nth-child(even) .timeline-label {
      top: auto;
      bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="timeline">
    <div class="timeline-point">
      <div class="timeline-dot"></div>
      <div class="timeline-label">Map Dependencies</div>
    </div>
    <div class="timeline-point">
      <div class="timeline-dot"></div>
      <div class="timeline-label">Detect Patterns</div>
    </div>
    <div class="timeline-point">
      <div class="timeline-dot"></div>
      <div class="timeline-label">Score Confidence</div>
    </div>
    <div class="timeline-point">
      <div class="timeline-dot"></div>
      <div class="timeline-label">Route Work</div>
    </div>
    <div class="timeline-point">
      <div class="timeline-dot"></div>
      <div class="timeline-label">Human Review</div>
    </div>
  </div>
</body>
</html>
