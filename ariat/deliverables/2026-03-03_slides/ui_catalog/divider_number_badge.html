<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Number Badge Divider</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .divider-number {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 500px;
    }

    .divider-number .line {
      flex: 1;
      height: 1px;
      background: #d4d4d8;
    }

    .divider-number .badge {
      width: 32px;
      height: 32px;
      background: #fff;
      border: 2px solid #7c3aed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #5b21b6;
    }
  </style>
</head>
<body>
  <div class="divider-number">
    <div class="line"></div>
    <div class="badge">01</div>
    <div class="line"></div>
  </div>
</body>
</html>
