<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Minimal Circles</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .icon-circles {
      display: flex;
      gap: 16px;
    }

    .icon-circle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .icon-circle .circle {
      width: 56px;
      height: 56px;
      border: 2px solid #7c3aed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #5b21b6;
    }

    .icon-circle .label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="icon-circles">
    <div class="icon-circle">
      <div class="circle">&#x2699;</div>
      <div class="label">Dev</div>
    </div>
    <div class="icon-circle">
      <div class="circle">&#x2630;</div>
      <div class="label">Auto</div>
    </div>
    <div class="icon-circle">
      <div class="circle">&#x2261;</div>
      <div class="label">Data</div>
    </div>
    <div class="icon-circle">
      <div class="circle">&#x2709;</div>
      <div class="label">Docs</div>
    </div>
    <div class="icon-circle">
      <div class="circle">&#x2295;</div>
      <div class="label">Ops</div>
    </div>
  </div>
</body>
</html>
