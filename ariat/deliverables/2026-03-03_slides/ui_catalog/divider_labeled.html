<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Labeled Dividers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 50px;
      margin: 0;
      padding: 40px;
    }

    .container {
      width: 500px;
    }

    /* Style 1: Center label */
    .divider-center {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .divider-center .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e2e8f0);
    }

    .divider-center .line:last-child {
      background: linear-gradient(90deg, #e2e8f0, transparent);
    }

    .divider-center .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
    }

    /* Style 2: Left label with gradient */
    .divider-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .divider-left .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5b21b6;
    }

    .divider-left .line {
      flex: 1;
      height: 3px;
      background: linear-gradient(90deg, #5b21b6, #a855f7, transparent);
      border-radius: 2px;
    }

    /* Style 3: Pill label */
    .divider-pill {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider-pill .line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider-pill .label {
      padding: 6px 16px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 20px;
    }

    /* Style 4: Number badge */
    .divider-number {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider-number .num {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .divider-number .label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .divider-number .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, #a855f7, transparent);
      border-radius: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="divider-center">
      <div class="line"></div>
      <div class="label">Solution Areas</div>
      <div class="line"></div>
    </div>
  </div>

  <div class="container">
    <div class="divider-left">
      <div class="label">Capabilities</div>
      <div class="line"></div>
    </div>
  </div>

  <div class="container">
    <div class="divider-pill">
      <div class="line"></div>
      <div class="label">Our Approach</div>
      <div class="line"></div>
    </div>
  </div>

  <div class="container">
    <div class="divider-number">
      <div class="num">01</div>
      <div class="label">Developer Productivity</div>
      <div class="line"></div>
    </div>
  </div>

</body>
</html>
