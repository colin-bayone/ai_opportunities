<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Element: Pill Badges</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 40px;
    }

    .badge-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge-pill {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
    }

    .badge-pill.outline {
      background: transparent;
      border: 1.5px solid #7c3aed;
      color: #5b21b6;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="badge-row">
    <span class="badge-pill">Graph Topology</span>
    <span class="badge-pill">Multi-Agent</span>
    <span class="badge-pill">Batch Processing</span>
    <span class="badge-pill outline">Confidence Scoring</span>
    <span class="badge-pill outline">Air-Gapped</span>
  </div>
</body>
</html>
